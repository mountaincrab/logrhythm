name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write # push tags + create releases

jobs:
  # Job 1: analyse conventional commits, bump semver, push the tag.
  tag:
    name: Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for conventional-commit analysis

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: "v"
          # Conventional-commit mapping (action defaults):
          #   feat: -> minor, fix: -> patch, BREAKING CHANGE / ! -> major

  # Job 2: build the tagged commit and publish the release.
  # The single `if` gates the whole job — it only runs when job 1 created a tag,
  # so no per-step conditionals are needed. The build runs AFTER tagging, so
  # Gradle's `git describe` sees the new tag and emits a clean X.Y.Z versionName.
  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # includes the tag job 1 just pushed, so the version resolves cleanly

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
            echo "Using real google-services.json from secret"
          else
            cp app/google-services.json.placeholder app/google-services.json
            echo "GOOGLE_SERVICES_JSON secret not set; using placeholder (Firebase will not work at runtime)"
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Decode debug keystore
        run: |
          if [ -n "$DEBUG_KEYSTORE" ]; then
            echo "$DEBUG_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/debug.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/debug.keystore" >> "$GITHUB_ENV"
            echo "Keystore decoded from secret"
          else
            echo "DEBUG_KEYSTORE secret not set; using ephemeral key (Google Sign-In won't work in this build)"
          fi
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/logrhythm-${{ needs.tag.outputs.new_tag }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_tag }}
          body: ${{ needs.tag.outputs.changelog }}
          files: app/build/outputs/apk/debug/logrhythm-${{ needs.tag.outputs.new_tag }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
