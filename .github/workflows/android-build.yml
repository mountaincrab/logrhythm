name: Android Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (Android)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Compute APK name
        id: apk_name
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          BRANCH="${GITHUB_REF_NAME//\//-}"
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            NAME="logrhythm-v${VERSION}"
          else
            NAME="logrhythm-${BRANCH}-${SHORT_SHA}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ steps.apk_name.outputs.name }}.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_name.outputs.name }}
          path: app/build/outputs/apk/debug/${{ steps.apk_name.outputs.name }}.apk
          retention-days: 14
