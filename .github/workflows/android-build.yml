name: Android Build

on:
  # CI runs on pull requests only. Pushes to main are handled by release.yml,
  # which tags the commit and then builds the correctly-versioned release.
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (Android)
    runs-on: ubuntu-latest

    # On pull_request, GITHUB_REF_NAME is the synthetic merge ref ("<pr>/merge")
    # and GITHUB_SHA is the ephemeral merge commit (and GITHUB_* vars can't be
    # overridden). Pass the PR's real head branch + commit via these unreserved
    # vars, which build.gradle.kts reads first, so the version is <base>-<branch>.<sha>.
    env:
      VERSION_BRANCH: ${{ github.head_ref }}
      VERSION_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} # the branch tip, not the merge commit
          fetch-depth: 0 # full history + tags so Gradle can derive the version from git

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
            echo "Using real google-services.json from secret"
          else
            cp app/google-services.json.placeholder app/google-services.json
            echo "GOOGLE_SERVICES_JSON secret not set; using placeholder (Firebase will not work at runtime)"
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Decode debug keystore
        run: |
          if [ -n "$DEBUG_KEYSTORE" ]; then
            echo "$DEBUG_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/debug.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/debug.keystore" >> "$GITHUB_ENV"
            echo "Keystore decoded from secret"
          else
            echo "DEBUG_KEYSTORE secret not set; using ephemeral key (Google Sign-In won't work in this build)"
          fi
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      # Read the versionName Gradle baked into the APK so the filename matches it
      # exactly (single source of truth), e.g. logrhythm-1.2.3-my-branch.abc1234.apk.
      - name: Rename APK
        id: apk_name
        run: |
          VERSION=$(./gradlew -q :app:printVersionName)
          echo "name=logrhythm-${VERSION}" >> "$GITHUB_OUTPUT"
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/logrhythm-${VERSION}.apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_name.outputs.name }}
          path: app/build/outputs/apk/debug/${{ steps.apk_name.outputs.name }}.apk
          retention-days: 14
